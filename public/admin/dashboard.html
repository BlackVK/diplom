<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>⚙️ Админ-панель</h1>
            <div class="header-buttons">
                <span id="adminName"></span>
                <button onclick="logout()">Выйти</button>
            </div>
        </header>
        
        <div class="admin-content">
            <div class="stats-cards">
                <div class="stat-card">
                    <h3>Всего пользователей</h3>
                    <span id="totalUsers">0</span>
                </div>
                <div class="stat-card">
                    <h3>Всего убийств</h3>
                    <span id="totalKills">0</span>
                </div>
                <div class="stat-card">
                    <h3>Всего игр</h3>
                    <span id="totalGames">0</span>
                </div>
            </div>
            
            <h2>Список пользователей</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Убийств</th>
                            <th>Лучшая волна</th>
                            <th>Игр</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('admin_token');
        
        if (!token) {
            window.location.href = '/admin.html';
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                
                if (data.success) {
                    const tbody = document.getElementById('usersTableBody');
                    tbody.innerHTML = '';
                    
                    let totalUsers = 0;
                    let totalKills = 0;
                    let totalGames = 0;
                    
                    data.users.forEach(user => {
                        totalUsers++;
                        totalKills += user.total_kills || 0;
                        totalGames += user.games_played || 0;
                        
                        const isBanned = user.is_banned === 1;
                        const statusText = isBanned ? '🔴 Забанен' : '🟢 Активен';
                        
                        tbody.innerHTML += `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.username}</td>
                                <td>${user.email || '-'}</td>
                                <td>${user.total_kills || 0}</td>
                                <td>${user.best_wave || 0}</td>
                                <td>${user.games_played || 0}</td>
                                <td>${statusText}</td>
                                <td>
                                    ${!isBanned ? 
                                        `<button class="ban-btn" onclick="banUser(${user.id})">Забанить</button>` :
                                        `<button class="unban-btn" onclick="unbanUser(${user.id})">Разбанить</button>`
                                    }
                                </td>
                            </tr>
                        `;
                    });
                    
                    document.getElementById('totalUsers').textContent = totalUsers;
                    document.getElementById('totalKills').textContent = totalKills;
                    document.getElementById('totalGames').textContent = totalGames;
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }
        
        async function banUser(userId) {
            const reason = prompt('Причина бана:');
            if (reason === null) return;
            
            try {
                const response = await fetch('/api/admin/users/' + userId + '/ban', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    },
                    body: JSON.stringify({ reason: reason || 'Нарушение правил' })
                });
                const data = await response.json();
                if (data.success) {
                    loadUsers();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Ошибка');
            }
        }
        
        async function unbanUser(userId) {
            if (!confirm('Разбанить пользователя?')) return;
            
            try {
                const response = await fetch('/api/admin/users/' + userId + '/unban', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    }
                });
                const data = await response.json();
                if (data.success) {
                    loadUsers();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('Ошибка');
            }
        }
        
        function logout() {
            localStorage.removeItem('admin_token');
            window.location.href = '/admin.html';
        }
        
        loadUsers();
    </script>
</body>
</html>
